services:
  - type: web
    name: zyven-portfolio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: zyven@admin2026
      - key: PYTHON_VERSION
        value: 3.11.11
